apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant-deployment
  namespace: ai-rag-app
  labels:
    app.kubernetes.io/name: qdrant
    app.kubernetes.io/component: qdrant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:latest
          ports:
            - containerPort: 6333
              name: http
          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage
      volumes:
        - name: qdrant-storage
          persistentVolumeClaim:
            claimName: qdrant-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant-service
  namespace: ai-rag-app
  labels:
    app.kubernetes.io/name: qdrant
    app.kubernetes.io/component: qdrant
spec:
  type: ClusterIP
  selector:
    app: qdrant
  ports:
    - name: http
      port: 6333
      targetPort: 6333
